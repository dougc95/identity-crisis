name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build and package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/pkg | Out-Null
          go build -ldflags '-s -w' -o dist/pkg/sshwrap.exe ./cmd/sshwrap
          go build -ldflags '-s -w -H windowsgui' -o dist/pkg/tray.exe ./cmd/tray
          Copy-Item README.md, LICENSE, identities.example.toml dist/pkg/
          Compress-Archive -Path dist/pkg/* -DestinationPath "dist/identity-crisis-${{ github.ref_name }}-windows-amd64.zip" -Force

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes "dist/identity-crisis-${{ github.ref_name }}-windows-amd64.zip" dist/pkg/tray.exe dist/pkg/sshwrap.exe
